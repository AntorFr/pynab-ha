{% load i18n %}
<div class="card" id="homeassistant-settings">
  <form action="/nabhomeassistantd/settings">
    {% csrf_token %}
    <div class="card-header">
      <h5 class="card-title">{% trans "Home Assistant" %}</h5>
    </div>
    <div class="card-body">
      <p>{% trans "Expose basic Nabaztag controls to Home Assistant through MQTT discovery." %}</p>

      <div class="form-group row">
        <label for="haEnabled" class="col-6 col-form-label">{% trans "Enabled" %}</label>
        <div class="col-6">
          <input id="haEnabled" name="enabled" type="checkbox" {% if config.enabled %}checked{% endif %}/>
        </div>
      </div>

      <div class="form-group row">
        <label for="haMqttHost" class="col-6 col-form-label">{% trans "MQTT host" %}</label>
        <div class="col-6">
          <input id="haMqttHost" name="mqtt_host" type="text" class="form-control" value="{{ config.mqtt_host }}"/>
        </div>
      </div>

      <div class="form-group row">
        <label for="haMqttPort" class="col-6 col-form-label">{% trans "MQTT port" %}</label>
        <div class="col-6">
          <input id="haMqttPort" name="mqtt_port" type="number" min="1" max="65535" class="form-control" value="{{ config.mqtt_port }}"/>
        </div>
      </div>

      <div class="form-group row">
        <label for="haMqttUsername" class="col-6 col-form-label">{% trans "MQTT username" %}</label>
        <div class="col-6">
          <input id="haMqttUsername" name="mqtt_username" type="text" class="form-control" value="{{ config.mqtt_username }}"/>
        </div>
      </div>

      <div class="form-group row">
        <label for="haMqttPassword" class="col-6 col-form-label">{% trans "MQTT password" %}</label>
        <div class="col-6">
          <input id="haMqttPassword" name="mqtt_password" type="password" class="form-control" value=""/>
        </div>
      </div>

      <div class="form-group row">
        <label for="haDeviceName" class="col-6 col-form-label">{% trans "Device name" %}</label>
        <div class="col-6">
          <input id="haDeviceName" name="device_name" type="text" class="form-control" value="{{ config.device_name }}"/>
        </div>
      </div>

      <div class="form-group row">
        <label for="haDiscoveryPrefix" class="col-6 col-form-label">{% trans "Discovery prefix" %}</label>
        <div class="col-6">
          <input id="haDiscoveryPrefix" name="discovery_prefix" type="text" class="form-control" value="{{ config.discovery_prefix }}"/>
        </div>
      </div>

      <div class="form-group row">
        <label for="haTopicPrefix" class="col-6 col-form-label">{% trans "Topic prefix" %}</label>
        <div class="col-6">
          <input id="haTopicPrefix" name="topic_prefix" type="text" class="form-control" value="{{ config.topic_prefix }}"/>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <div class="row mb-2">
        <div class="col-12">
          <button type="submit" class="btn btn-primary disabled ml-2 float-right save-button">{% trans "Save" %}</button>
          <button type="reset" class="btn btn-outline-primary disabled ml-2 float-right reset-button">{% trans "Reset" %}</button>
        </div>
      </div>
    </div>
  </form>
  <script type="text/javascript">
  $(function() {
    var form = $('#homeassistant-settings form');
    var saveBtn = form.find('button.save-button');
    var resetBtn = form.find('button.reset-button');
    var url = form.attr('action');
    form.find('input').on('change keyup', function() {
      saveBtn.removeClass('disabled');
      resetBtn.removeClass('disabled');
    });
    form.on('submit', function() {
      $.ajax({
        url: url,
        method: "POST",
        data: form.serialize(),
        success: function (data) {
          $("#homeassistant-settings").replaceWith(data);
        },
        error: function () {
          $.bootstrapGrowl("{% trans "Unknown server error" %}", {type: 'danger', allow_dismiss: true});
        }
      });
      return false;
    });
    resetBtn.on("click", function() {
      $.get(url, function(data) {
        $("#homeassistant-settings").replaceWith(data);
      });
    });
  });
  </script>
</div>
