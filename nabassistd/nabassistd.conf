# Enable Assist Satellite support.
PYNAB_ASSIST_ENABLED=0

# Home Assistant Wyoming endpoint.
PYNAB_ASSIST_WYOMING_HOST=homeassistant.local
PYNAB_ASSIST_WYOMING_PORT=10300

# Satellite identity and wake-word settings.
PYNAB_ASSIST_NAME=Pynab
PYNAB_ASSIST_WAKE_ENGINE=micro
PYNAB_ASSIST_WAKE_MODEL=okay_nabu
PYNAB_ASSIST_WAKE_SENSITIVITY=0.5
PYNAB_ASSIST_PRE_ROLL_SECONDS=1.0
PYNAB_ASSIST_WAKE_FALLBACK_REMOTE=0
